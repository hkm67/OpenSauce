services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: "replace-this-secret"
      DATABASE_PATH: "/data/opensauce.db"
      GITHUB_CLIENT_ID: ""
      GITHUB_CLIENT_SECRET: ""
      GITHUB_REDIRECT_URI: "http://localhost:8000/oauth/github/callback"
      # OAUTH_SUCCESS_REDIRECT: "https://your-frontend.example/"
      # OAUTH_TOKEN_IN_FRAGMENT: "1"
      # AUTH_COOKIE_SECURE: "1"
    volumes:
      - opensauce-data:/data

volumes:
  opensauce-data:
