services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: "${SECRET_KEY:?Copy .env.example to .env and set SECRET_KEY}"
      DB_URL_TEMPLATE: "${DB_URL_TEMPLATE:?Copy .env.example to .env and set DB_URL_TEMPLATE from Supabase}"
      DB_PASSWORD: "${DB_PASSWORD:?Copy .env.example to .env and set DB_PASSWORD from Supabase}"
      SUPABASE_URL: "${SUPABASE_URL:?Copy .env.example to .env and set SUPABASE_URL}"
      SUPABASE_PUBLISHABLE_KEY: "${SUPABASE_PUBLISHABLE_KEY:?Copy .env.example to .env and set SUPABASE_PUBLISHABLE_KEY}"
      GITHUB_REDIRECT_URI: "${GITHUB_REDIRECT_URI:-http://localhost:8000/oauth/github/callback}"
      OAUTH_SUCCESS_REDIRECT: "${OAUTH_SUCCESS_REDIRECT:-http://localhost:3000/oauth/callback}"
      TOKEN_EXPIRES_SECONDS: "${TOKEN_EXPIRES_SECONDS:-86400}"
      CORS_ALLOWED_ORIGIN: "${CORS_ALLOWED_ORIGIN:-http://localhost:3000}"
      # Overrides the domain used in generated SKILL.md URLs and magic links.
      # Defaults to the API's own request host when not set.
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:8000}"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:80"
    depends_on:
      - api
