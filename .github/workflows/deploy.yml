name: Build Test Deploy

env:
  PRODUCTION_BACKEND_URL: https://api.opensauce.itdogtics.com
  PRODUCTION_FRONTEND_URL: https://opensauce.itdogtics.com

on:
  pull_request:
  push:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: "Deploy frontend after tests pass"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      deploy_backend:
        description: "Deploy this commit to the production backend after tests pass"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      frontend_target:
        description: "Vercel target for manual frontend deploys"
        required: true
        default: "preview"
        type: choice
        options: ["preview", "production"]

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || env.PRODUCTION_BACKEND_URL }}

  backend-build:
    runs-on: ubuntu-latest
    needs: backend-unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: opensauce-backend:ci

  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == 'true')
    needs: [backend-unit-tests, frontend-build, backend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g vercel
      - run: vercel pull --yes --environment="$VERCEL_ENVIRONMENT" --token "$VERCEL_TOKEN"
        env:
          VERCEL_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.frontend_target || 'production' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - run: |
          if [ "$VERCEL_TARGET" = "production" ]; then
            vercel build --prod --token "$VERCEL_TOKEN"
          else
            vercel build --token "$VERCEL_TOKEN"
          fi
        env:
          VERCEL_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.frontend_target || 'production' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - run: |
          if [ "$VERCEL_TARGET" = "production" ]; then
            vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
          else
            vercel deploy --prebuilt --token "$VERCEL_TOKEN"
          fi
        env:
          VERCEL_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.frontend_target || 'production' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_backend == 'true')
    needs: [backend-unit-tests, frontend-build, backend-build]
    steps:
      - name: Sync Render production URLs
        run: |
          set -euo pipefail
          set_render_env() {
            key="$1"
            value="$2"
            curl -fsS -X PUT "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$key" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"value\":\"$value\"}" >/dev/null
          }

          set_render_env "PUBLIC_BASE_URL" "$PRODUCTION_BACKEND_URL"
          set_render_env "GITHUB_REDIRECT_URI" "$PRODUCTION_BACKEND_URL/oauth/github/callback"
          set_render_env "OAUTH_SUCCESS_REDIRECT" "$PRODUCTION_FRONTEND_URL/oauth/callback"
          set_render_env "CORS_ALLOWED_ORIGIN" "$PRODUCTION_FRONTEND_URL"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      - name: Deploy exact commit to Render
        run: |
          curl -fsS -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\":\"$GITHUB_SHA\",\"clearCache\":\"do_not_clear\"}"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
